onboarding = false

[keys]
# Press Ctrl+q, release, then the action key.
prefix = "ctrl+q"

[[keys.command]]
key = "prefix+a"
type = "shell"
description = "rename focused agent"
command = '''
sh "${XDG_CONFIG_HOME:-$HOME/.config}/herdr/rename-agent-launch.sh"
'''

# Backup direct shortcut in case Ctrl+q is swallowed by the terminal/TTY.
[[keys.command]]
key = "ctrl+alt+r"
type = "shell"
description = "rename focused agent"
command = '''
sh "${XDG_CONFIG_HOME:-$HOME/.config}/herdr/rename-agent-launch.sh"
'''

[ui]
agent_panel_sort = "spaces"
