set -g mouse on
setw -g mode-keys vi
set -g history-limit 100000

set -g prefix C-q
unbind C-b
unbind C-q
bind C-q send-prefix

bind r source-file ~/.tmux.conf \; display-message "reloaded"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind | split-window -h
bind - split-window -v

setw -g automatic-rename off
set -g base-index 1
setw -g pane-base-index 1

set -g visual-bell on
set -g bell-action any
setw -g monitor-bell on

set -g set-clipboard on
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:clipboard,xterm-256color:clipboard"
set -g terminal-overrides "xterm-256color:Ms=\033]52;c;%p1%.0s%p2%s\007"

# --- Claude Code friendliness ---
# Snappy Esc (Claude Code uses Esc to interrupt) instead of the default lag
set -sg escape-time 10
# Tell the app when its pane gains/loses focus
set -g focus-events on
# Pass Shift+Enter / Alt+Enter through so multiline prompt input works
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Let escape sequences (image rendering, OSC) pass through tmux untouched
set -g allow-passthrough on
# True color for correct TUI rendering
set -as terminal-features ',*:RGB'
# --- end Claude Code ---

bind [ copy-mode

# Pi sticky-input turns on application mouse tracking so it can receive wheel
# events while the prompt stays editable. tmux's default binding forwards
# left-button drags to apps that requested mouse tracking, which blocks the
# usual tmux drag-to-copy selection. Keep wheel events forwarded to Pi, but
# always make left-drag start tmux copy-mode selection.
bind -T root MouseDrag1Pane if-shell -F '#{==:#{pane_current_command},pi}' { copy-mode -M } { if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M } }

unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
